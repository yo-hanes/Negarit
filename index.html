                      <div className="space-y-3">
                        <div className="flex justify-between items-center text-xs">
                          <span className="text-slate-500 font-semibold">Crisis Protected Broadcast Copy (Read-Only)</span>
                          <span className="text-slate-500 font-semibold font-mono">
                            {smsTexts[activeSmsState][activeLanguage].length} characters
                          </span>
                        </div>

                        <div className="p-4 rounded-xl bg-slate-950 border border-slate-900 font-semibold text-sm leading-relaxed text-slate-300 relative group hover:border-slate-800 transition-all">
                          <p className="select-all">{smsTexts[activeSmsState][activeLanguage]}</p>
                          <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <span className="text-[9px] font-bold text-slate-500 bg-slate-900 px-2 py-0.5 rounded border border-slate-800">
                              Double Click to Select
                            </span>
                          </div>
                        </div>
                      </div>
                    </div>



                    {/* Operational controls buttons with role-based restriction layers */}
                    <div className="space-y-4 pt-4 border-t border-slate-900">
                      
                      {/* Security Warning Banner if user cannot authorize */}
                      {!hasBroadcastPermission && (
                        <div className="p-3 bg-brand-red/10 border border-brand-red/25 rounded-xl flex items-start gap-2.5 text-xs text-brand-red">
                          <Icons.Lock className="w-4 h-4 mt-0.5 shrink-0" />
                          <div className="leading-normal">
                            <strong>Insufficient Clearance:</strong> Your logged-in profile role is <strong>{userRole}</strong>. Message broadcasts and alert rejections require <strong>Super Admin</strong> or <strong>Admin</strong> privileges.
                          </div>
                        </div>
                      )}

                      <div className="flex gap-3">
                        {/* Reject & Dismiss button controlled by permissions */}
                        <button 
                          onClick={() => {
                            if (!hasBroadcastPermission) return;
                            if(confirm("Confirm dismissing this critical threat alert? This will clear sensor flags.")) {
                              setPendingApprovalsCount(0);
                              alert("Threat alert dismissed.");
                            }
                          }}
                          disabled={!hasBroadcastPermission}
                          className={`flex-1 py-3 px-4 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2 ${
                            hasBroadcastPermission
                              ? 'bg-brand-red/10 hover:bg-brand-red/15 border border-brand-red/20 text-brand-red cursor-pointer'
                              : 'bg-slate-950 border-slate-900 text-slate-600 opacity-60 cursor-not-allowed'
                          }`}
                        >
                          {!hasBroadcastPermission && <Icons.Lock className="w-3.5 h-3.5" />}
                          <span>Reject & Dismiss</span>
                        </button>
                      </div>

                      {/* Authorize action button with role-based visual lock state */}
                      <button 
                        onClick={handleAuthorizeBroadcast}
                        disabled={!hasBroadcastPermission}
                        className={`w-full py-4 px-6 rounded-xl font-bold transition-all duration-300 flex items-center justify-center gap-3 text-sm tracking-wider uppercase border text-center ${
                          hasBroadcastPermission
                            ? 'bg-brand-green hover:bg-brand-greenDark text-slate-950 border-brand-greenLight/20 cursor-pointer shadow-lg shadow-brand-green/20 group relative overflow-hidden active:scale-[0.99]'
                            : 'bg-slate-900/50 border-slate-955 text-slate-500 opacity-50 cursor-not-allowed'
                        }`}
                      >
                        {hasBroadcastPermission ? (
                          <>
                            <span className="absolute -inset-1 rounded-xl bg-brand-green/10 opacity-75 group-hover:animate-ping-slow"></span>
                            <Icons.Send className="w-5 h-5 text-slate-950 animate-pulse-slow" />
                            <span>AUTHORIZE BROADCAST VIA SMS Api</span>
                          </>
                        ) : (
                          <>
                            <Icons.Lock className="w-5 h-5 text-slate-500" />
                            <span>🔒 BROADCAST LOCKED (INSUFFICIENT PERMISSIONS)</span>
                          </>
                        )}
                      </button>
                    </div>
                  </div>
                </div>
              )}


              {/* ==================== PAGE 4: SYSTEM CONFIGURATIONS ==================== */}
              {currentTab === 'configs' && (
                <div className="space-y-8 flex-1 flex flex-col">
                  
                  {/* Warning message if user has Visitor (read-only) clearance */}
                  {userRole === 'Visitor' && (
                    <div className="p-4 bg-brand-yellow/10 border border-brand-yellow/30 rounded-2xl flex items-start gap-3 text-xs text-brand-yellow">
                      <Icons.Lock className="w-5 h-5 mt-0.5 shrink-0 text-brand-yellow" />
                      <div className="leading-relaxed">
                        <strong className="block text-sm font-semibold mb-0.5">Read-Only Observer Clearance Mode</strong>
                        You are currently authenticated under the <strong>Visitor</strong> role. You can explore the user configurations table, but settings modifications, operator addition, operator revocation, and trigger threshold sliders are locked and disabled.
                      </div>
                    </div>
                  )}

                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    
                    {/* Config Left Column: User Permission Matrix Table */}
                    <div className="glass-premium rounded-2xl p-6 border border-slate-800 lg:col-span-2 space-y-6">
                      <div className="flex justify-between items-center">
                        <div>
                          <h3 className="font-display font-bold text-lg text-white">System Operator Permission Matrix</h3>
                          <p className="text-xs text-slate-400">Credential hierarchy representing the 5 access tiers</p>
                        </div>
                        <span className="text-xs text-slate-400 bg-slate-900 border border-slate-800 px-3 py-1 rounded font-mono font-semibold">
                          Active Operators: {users.length}
                        </span>
                      </div>

                      <div className="overflow-x-auto rounded-xl border border-slate-800">
                        <table className="w-full text-left text-xs border-collapse">
                          <thead>
                            <tr className="bg-slate-950/80 text-slate-400 font-bold uppercase tracking-wider border-b border-slate-800">
                              <th className="px-4 py-3">Operator Name</th>
                              <th className="px-4 py-3">District</th>
                              <th className="px-4 py-3">Designated Role</th>
                              <th className="px-4 py-3">System Access Description</th>
                              <th className="px-4 py-3 text-right">Actions</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-800/80">
                            {users.map(u => (
                              <tr key={u.id} className="hover:bg-slate-900/40 transition-colors">
                                <td className="px-4 py-3.5 font-bold text-white flex items-center gap-2.5">
                                  <div className="w-7 h-7 rounded bg-slate-900 border border-slate-800 flex items-center justify-center text-slate-400 font-mono text-[10px]">
                                    OP
                                  </div>
                                  <span>{u.name}</span>
                                </td>
                                <td className="px-4 py-3.5 text-slate-400 font-medium">{u.woreda}</td>
                                <td className="px-4 py-3.5">
                                  <span className={`inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded border font-semibold ${
                                    u.role === 'Super Admin' 
                                      ? 'bg-brand-red/10 border-brand-red/30 text-brand-red' 
                                      : u.role === 'Admin'
                                      ? 'bg-brand-green/10 border-brand-green/30 text-brand-green'
                                      : u.role === 'Technical Team'
                                      ? 'bg-blue-500/10 border-blue-500/30 text-blue-400'
                                      : u.role === 'Normal User'
                                      ? 'bg-purple-500/10 border-purple-500/30 text-purple-400'
                                      : 'bg-slate-500/10 border-slate-500/30 text-slate-400'
                                  }`}>
                                    <Icons.Shield className="w-3.5 h-3.5" />
                                    {u.role}
                                  </span>
                                </td>
                                <td className="px-4 py-3.5 text-slate-400 max-w-xs truncate">{u.desc || 'No description allocated.'}</td>
                                <td className="px-4 py-3.5 text-right">
                                  <button 
                                    onClick={() => {
                                      if (userRole === 'Visitor') return;
                                      handleDeleteUser(u.id);
                                    }}
                                    disabled={userRole === 'Visitor'}
                                    className={`p-1.5 rounded-lg border transition-all ${
                                      userRole === 'Visitor'
                                        ? 'bg-slate-950 border-slate-900 text-slate-700 cursor-not-allowed opacity-55'
                                        : 'bg-slate-950 border-slate-900 text-slate-500 hover:text-brand-red hover:border-brand-red/30 cursor-pointer'
                                    }`}
                                    title="Revoke Permission"
                                  >
                                    <Icons.Trash className="w-4 h-4" />
                                  </button>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>

                    {/* Config Right Column: User Addition & Threshold Settings */}
                    <div className="space-y-6">
                      
                      {/* Sub-card 1: Add Operator */}
                      <div className="glass-premium rounded-2xl p-6 border border-slate-800 space-y-4 relative">
                        {userRole === 'Visitor' && (
                          <div className="absolute inset-0 bg-slate-950/80 rounded-2xl flex flex-col justify-center items-center text-center p-4 z-10 backdrop-blur-xs">
                            <Icons.Lock className="w-8 h-8 text-brand-yellow mb-2" />
                            <h4 className="font-bold text-sm text-slate-300">Form Disabled</h4>
                            <p className="text-[11px] text-slate-500 mt-1 max-w-[200px]">Visitor profiles cannot register system credentials.</p>
                          </div>
                        )}
                        <h3 className="font-display font-bold text-base text-white flex items-center gap-2">
                          <Icons.Plus className="w-5 h-5 text-brand-green" /> Add District Operator
                        </h3>
                        <form onSubmit={handleAddUser} className="space-y-3">
                          <div className="space-y-1">
                            <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Username</label>
                            <input 
                              type="text" 
                              required
                              placeholder="e.g. Operator_East_Shewa" 
                              value={newUserName}
                              onChange={(e) => setNewUserName(e.target.value)}
                              className="w-full bg-slate-950 text-slate-100 p-2.5 rounded-lg border border-slate-800 focus:border-brand-green focus:ring-1 focus:ring-brand-green text-xs font-semibold focus:outline-none"
                            />
                          </div>
                          <div className="space-y-1">
                            <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Assigned District</label>
                            <select 
                              value={newUserWoreda}
                              onChange={(e) => setNewUserWoreda(e.target.value)}
                              className="w-full bg-slate-950 text-slate-100 p-2.5 rounded-lg border border-slate-800 focus:border-brand-green focus:ring-1 focus:ring-brand-green text-xs font-semibold focus:outline-none cursor-pointer"
                            >
                              <option value="East Shewa (Adama)">East Shewa (Adama)</option>
                              <option value="Gamo Zone Highlands">Gamo Zone Highlands</option>
                              <option value="Afar Region">Afar Region</option>
                              <option value="Wolaita Zone">Wolaita Zone</option>
                            </select>
                          </div>
                          <div className="space-y-1">
                            <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Designated Access Role</label>
                            <select 
                              value={newUserRole}
                              onChange={(e) => setNewUserRole(e.target.value)}
                              className="w-full bg-slate-950 text-slate-100 p-2.5 rounded-lg border border-slate-800 focus:border-brand-green focus:ring-1 focus:ring-brand-green text-xs font-bold focus:outline-none cursor-pointer"
                            >
                              <option value="Super Admin">Super Admin</option>
                              <option value="Admin">Admin</option>
                              <option value="Technical Team">Technical Team</option>
                              <option value="Normal User">Normal User</option>
                              <option value="Visitor">Visitor</option>
                            </select>
                          </div>
                          <button 
                            type="submit"
                            className="w-full bg-brand-green hover:bg-brand-greenDark text-slate-950 py-2.5 rounded-lg font-extrabold text-xs transition-all flex items-center justify-center gap-2 mt-2 shadow-lg shadow-brand-green/10 cursor-pointer"
                          >
                            <Icons.Plus className="w-4 h-4 text-slate-950" />
                            <span>Add Operator Token</span>
                          </button>
                        </form>
                      </div>

                      {/* Sub-card 2: System Threshold Slider Settings */}
                      <div className="glass-premium rounded-2xl p-6 border border-slate-800 space-y-6 relative">
                        {!hasThresholdSliderPermission && (
                          <div className="absolute inset-0 bg-slate-950/85 rounded-2xl flex flex-col justify-center items-center text-center p-4 z-10 backdrop-blur-xs">
                            <Icons.Lock className="w-8 h-8 text-brand-red mb-2" />
                            <h4 className="font-bold text-sm text-slate-350">Sliders Locked</h4>
                            <p className="text-[11px] text-slate-500 mt-1 max-w-[210px]">
                              Threshold settings are restricted to **Super Admin** or **Technical Team** roles. Your current role is: **{userRole}**.
                            </p>
                          </div>
                        )}
                        <div>
                          <h3 className="font-display font-bold text-base text-white flex items-center gap-2">
                            <span>🎚️</span> Automation Thresholds
                          </h3>
                          <p className="text-xs text-slate-400 mt-1">Configure parameters for automatic alert triggers</p>
                        </div>
                        
                        <div className="space-y-5">
                          {/* Slider 1: AI Confidence */}
                          <div className="space-y-2">
                            <div className="flex justify-between text-xs font-semibold">
                              <span className="text-slate-300">AI Confidence Trigger</span>
                              <span className="text-brand-green font-mono font-bold">{aiConfidenceThreshold}%</span>
                            </div>
                            <input 
                              type="range" 
                              min="50" 
                              max="100" 
                              disabled={!hasThresholdSliderPermission}
                              value={aiConfidenceThreshold}
                              onChange={(e) => setAiConfidenceThreshold(parseInt(e.target.value))}
                              className="w-full h-1 bg-slate-950 rounded-lg appearance-none cursor-pointer accent-brand-green focus:outline-none disabled:opacity-40"
                            />
                            <div className="flex justify-between text-[9px] text-slate-500 font-mono">
                              <span>50% (Lenient)</span>
                              <span>100% (Strict)</span>
                            </div>
                          </div>

                          {/* Slider 2: Minimum reports */}
                          <div className="space-y-2">
                            <div className="flex justify-between text-xs font-semibold">
                              <span className="text-slate-300">Min Corroborating Reports</span>
                              <span className="text-brand-green font-mono font-bold">{minCrowdReports} reports</span>
                            </div>
                            <input 
                              type="range" 
                              min="3" 
                              max="50" 
                              disabled={!hasThresholdSliderPermission}
                              value={minCrowdReports}
                              onChange={(e) => setMinCrowdReports(parseInt(e.target.value))}
                              className="w-full h-1 bg-slate-950 rounded-lg appearance-none cursor-pointer accent-brand-green focus:outline-none disabled:opacity-40"
                            />
                            <div className="flex justify-between text-[9px] text-slate-500 font-mono">
                              <span>3 reports</span>
                              <span>50 reports</span>
                            </div>
                          </div>
                        </div>

                        <div className="p-3 bg-slate-950/60 border border-slate-900 rounded-lg text-[10px] text-slate-500 leading-normal">
                          <strong>Note:</strong> Sliders modulate hazard classifications across vector map networks. Adjustments apply dynamically.
                        </div>
                      </div>

                    </div>
                  </div>
                </div>
              )}

            </div>
          </main>

          {/* ==================== MODAL: SMS BROADCAST PIPELINE SUCCESS ==================== */}
          {showBroadcastModal && (
            <div className="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-4 animate-fadeIn">
              <div className="glass-premium rounded-2xl max-w-lg w-full border border-slate-800 p-8 space-y-6 shadow-2xl relative">
                
                {/* Modal close button */}
                {isBroadcastComplete && (
                  <button 
                    onClick={() => setShowBroadcastModal(false)}
                    className="absolute top-4 right-4 p-1.5 rounded-lg bg-slate-900 border border-slate-800 text-slate-400 hover:text-white cursor-pointer"
                  >
                    <Icons.Close className="w-4.5 h-4.5" />
                  </button>
                )}

                <div className="text-center space-y-3">
                  {!isBroadcastComplete ? (
                    <div className="w-16 h-16 rounded-full bg-brand-green/10 border border-brand-green/45 flex items-center justify-center mx-auto relative">
                      <span className="absolute inset-0 rounded-full bg-brand-green/10 animate-ping-slow"></span>
                      <Icons.Send className="w-8 h-8 text-brand-green animate-pulse-slow" />
                    </div>
                  ) : (
                    <div className="w-16 h-16 rounded-full bg-brand-green border-2 border-white flex items-center justify-center mx-auto shadow-lg shadow-brand-green/30">
                      <span className="text-2xl text-slate-950 font-bold">✓</span>
                    </div>
                  )}
                  
                  <h3 className="font-display font-extrabold text-xl text-white">
                    {!isBroadcastComplete ? "Geo-Fenced Broadcast Pipeline Active" : "Broadcast Pipelines Completed"}
                  </h3>
                  <p className="text-xs text-slate-400 max-w-sm mx-auto leading-relaxed">
                    {!isBroadcastComplete 
                      ? "Connecting to telecom nodes to deploy geofenced warning packets to Adama..."
                      : "The localized emergency SMS payloads have been dispatched successfully via SMS API."}
                  </p>
                </div>

                {/* Progress Steps Timeline */}
                <div className="space-y-4 py-4 border-t border-b border-slate-900">
                  
                  {/* Step 1 */}
                  <div className="flex gap-4 items-start text-xs">
                    <div className={`w-5 h-5 rounded-full flex items-center justify-center shrink-0 font-bold ${
                      broadcastStep >= 1 ? 'bg-brand-green text-slate-950 font-bold' : 'bg-slate-900 text-slate-500 border border-slate-800'
                    }`}>
                      {broadcastStep >= 1 ? '✓' : '1'}
                    </div>
                    <div>
                      <h4 className={`font-bold ${broadcastStep >= 0 ? 'text-slate-200' : 'text-slate-500'}`}>Fetch Woreda Target Cell Towers</h4>
                      <p className="text-[10px] text-slate-500 mt-0.5">Identified 28 cells covering Adama district cluster.</p>
                    </div>
                  </div>

                  {/* Step 2 */}
                  <div className="flex gap-4 items-start text-xs">
                    <div className={`w-5 h-5 rounded-full flex items-center justify-center shrink-0 font-bold ${
                      broadcastStep >= 2 ? 'bg-brand-green text-slate-950 font-bold' : 'bg-slate-900 text-slate-500 border border-slate-800'
                    }`}>
                      {broadcastStep >= 2 ? '✓' : '2'}
                    </div>
                    <div>
                      <h4 className={`font-bold ${broadcastStep >= 1 ? 'text-slate-200' : 'text-slate-500'}`}>Prepare Bilingual Message Payloads</h4>
                      <p className="text-[10px] text-slate-500 mt-0.5">English (EN) and Afan Oromoo (OM) localized buffers loaded.</p>
                    </div>
                  </div>

                  {/* Step 3 */}
                  <div className="flex gap-4 items-start text-xs">
                    <div className={`w-5 h-5 rounded-full flex items-center justify-center shrink-0 font-bold ${
                      broadcastStep >= 3 ? 'bg-brand-green text-slate-950 font-bold' : 'bg-slate-900 text-slate-500 border border-slate-800'
                    }`}>
                      {broadcastStep >= 3 ? '✓' : '3'}
                    </div>
                    <div>
                      <h4 className={`font-bold ${broadcastStep >= 2 ? 'text-slate-200' : 'text-slate-500'}`}>Dispatch packets to SMS API</h4>
                      <p className="text-[10px] text-slate-500 mt-0.5">Deploying cellular packet buffers to ~45,000 subscriber nodes.</p>
                    </div>
                  </div>

                  {/* Step 4 */}
                  <div className="flex gap-4 items-start text-xs">
                    <div className={`w-5 h-5 rounded-full flex items-center justify-center shrink-0 font-bold ${
                      isBroadcastComplete ? 'bg-brand-green text-slate-950 font-bold' : 'bg-slate-900 text-slate-500 border border-slate-800'
                    }`}>
                      {isBroadcastComplete ? '✓' : '4'}
                    </div>
                    <div>
                      <h4 className={`font-bold ${broadcastStep >= 3 ? 'text-slate-200' : 'text-slate-500'}`}>Verify Telecom Dispatch Handshakes</h4>
                      <p className="text-[10px] text-slate-500 mt-0.5">Awaiting API confirmation and SMS dispatch queue callback status.</p>
                    </div>
                  </div>

                </div>

                {/* Detailed Summary details once complete */}
                {isBroadcastComplete && (
                  <div className="p-4 rounded-xl bg-slate-950 border border-slate-900 space-y-2.5 animate-fadeIn">
                    <div className="flex justify-between items-center text-xs">
                      <span className="text-slate-400">Total cellular targets:</span>
                      <span className="text-white font-mono font-bold">45,182 nodes</span>
                    </div>
                    <div className="flex justify-between items-center text-xs">
                      <span className="text-slate-400">Localized templates:</span>
                      <span className="text-white font-mono">EN & OM (Afan Oromoo)</span>
                    </div>
                    <div className="flex justify-between items-center text-xs">
                      <span className="text-slate-400">API Status:</span>
                      <span className="text-brand-green font-bold flex items-center gap-1">
                        <span className="w-1.5 h-1.5 rounded-full bg-brand-green"></span>
                        SUCCESS_DISPATCHED
                      </span>
                    </div>
                  </div>
                )}

                {isBroadcastComplete && (
                  <button 
                    onClick={() => setShowBroadcastModal(false)}
                    className="w-full bg-brand-green hover:bg-brand-greenDark text-slate-950 font-bold py-3 rounded-xl transition-all shadow-lg shadow-brand-green/20 cursor-pointer text-xs"
                  >
                    Close & Return to Console
                  </button>
                )}
              </div>
            </div>
          )}

        </div>
      );
    }

    // Render the React application
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
